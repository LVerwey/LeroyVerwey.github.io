<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Interactief Formulier</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="card-title mb-4">Registratieformulier</h3>

            <form id="myForm" class="needs-validation" novalidate>

                <!-- Naam -->
                <div class="mb-3">
                    <label class="form-label">Naam</label>
                    <input type="text" class="form-control" placeholder="bijv. gert" required>
                    <div class="invalid-feedback">
                        Naam is verplicht.
                    </div>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">E-mailadres</label>
                    <input type="email" class="form-control" placeholder="bijv. Gert.hans@gmail.com" required>
                    <div class="invalid-feedback">
                        Vul een geldig e-mailadres in.
                    </div>
                </div>

                <!-- Select -->
                <div class="mb-3">
                    <label class="form-label">Gebruikerstype</label>
                    <select class="form-select" id="userType" required>
                        <option value="">Kies...</option>
                        <option value="student">student</option>
                        <option value="bedrijf">Bedrijf</option>
                    </select>
                    <div class="invalid-feedback">
                        Maak een keuze.
                    </div>
                </div>

                <!-- Dynamisch veld -->
                <div class="mb-3 d-none" id="companyField">
                    <label class="form-label">Bedrijfsnaam</label>
                    <input type="text" class="form-control">
                </div>

                <!-- Checkbox -->
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" required>
                    <label class="form-check-label">
                        Ik ga akkoord met de voorwaarden
                    </label>
                    <div class="invalid-feedback">
                        Je moet akkoord gaan.
                    </div>
                </div>

                <!-- Submit -->
                <button class="btn btn-primary w-100" type="submit">
                    Versturen
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Bootstrap validatie
(() => {
    const form = document.getElementById('myForm');
    form.addEventListener('submit', event => {
        if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
        }
        form.classList.add('was-validated');
    });
})();

// Dynamisch veld tonen
document.getElementById("userType").addEventListener("change", function () {
    const companyField = document.getElementById("companyField");
    companyField.classList.toggle("d-none", this.value !== "bedrijf");
});
</script>

</body>
</html>
