<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mijn portfolio</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>


<!-- FOOTER -->
<footer class="bg-dark text-light mt-5">
  <div id="contact" class="container py-5 text-center">
    <h2>Contact</h2>
    <p>Neem gerust contact met mij op</p>

    <!-- Opent formulier -->
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#contactModal">
      Contactformulier
    </button>
  </div>
</footer>

<!-- CONTACT MODAL -->
<div class="modal fade" id="contactModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header mb-3">
        <h5 class="modal-title">Contactformulier</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

        <div class="container">
            <p>
                Vul hier uw gegevens in zodat ik contact met u kan opzoeken.
            </p>
        </div>

        <!--Naam-->
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Naam</label>
            <input type="text" class="form-control" placeholder="Bijv. Hans" required>
            <div class="invalid-feedback">
                Naam is verplicht
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">E-mail</label>
            <input type="email" class="form-control" placeholder="Bijv.hans.hendrix@Gmail.com" required>
            <div class="invalid-feedback">
              E-mail is verplicht
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Bericht</label>
            <textarea class="form-control" rows="4" placeholder="Zet hier een link in naar een vacaturen of jullie website. Zo kan ik kijken of jullie bij mij passen!" required></textarea>
            <div class="invalid-feedback">
              Graag iets invullen.
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Versturen
          </button>
        </form>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS (MOET ONDERAAN) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
